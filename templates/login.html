<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema</title>

    <!-- 🔥 CSS EXTERNO -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="login-container">
    <form action="/login" method="POST">
        <h2>Acessar Conta</h2>

        <div class="input-group">
            <label>Login</label>
            <input type="text" name="login_usuario" placeholder="Seu login..." required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="password_usuario" placeholder="********" required>
        </div>

        <!-- 🔥 MENSAGENS -->
        {% if erro %}
            <div class="erro">{{ erro }}</div>
        {% endif %}

        {% if sucesso %}
            <div class="sucesso">{{ sucesso }}</div>
        {% endif %}

        <button type="submit">ENTRAR</button>
    </form>
</div>

</body>
</html>
